<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Nexus Shinobi</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

    <body>

    <header class="topbar">

        <div class="logo">

            NEXUS 忍

        </div>

        <div class="player">

            <img src="../assets/images/jemi.jpg">

            <div>

                <h3>Jemi Uzumaki</h3>

                <small>Academy Student</small>

            </div>

        </div>

    </header>

    <main class="dashboard">

        <div class="welcome">

            <h1>Welcome Back, Jemi.</h1>

            <p>Your shinobi journey continues today.</p>

        </div>

        <div class="menu-grid">

            <div class="menu-card">
                ⚔
                <span>Battle</span>
            </div>

            <div class="menu-card">
                📜
                <span>Mission</span>
            </div>

            <div class="menu-card">
                🛒
                <span>Shop</span>
            </div>

            <div class="menu-card">
                🏆
                <span>Ranking</span>
            </div>

            <div class="menu-card">
                👤
                <span>Profile</span>
            </div>

            <div class="menu-card">
                ⚙
                <span>Settings</span>
            </div>

        </div>

    </main>

    <script src="../js/dashboard.js"></script>

    </body>

</html>
