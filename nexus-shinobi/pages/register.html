<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Nexus Shinobi</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/register.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="register-card">

    <h1>Shinobi Registration</h1>

    <p>Create your shinobi identity.</p>

<form id="registerForm">

    <input
        type="text"
        placeholder="Username"
        required>

    <input
        type="password"
        placeholder="Password"
        required>

    <input
        type="password"
        placeholder="Confirm Password"
        required>

    <input
        type="text"
        placeholder="Character Name"
        required>

    <input
        type="text"
        placeholder="Clan"
        required>

    <select required>

    <option selected disabled>
        Choose Village
    </option>

        <option>Konohagakure</option>

        <option>Kirigakure</option>

        <option>Sunagakure</option>

        <option>Kumogakure</option>

        <option>Iwagakure</option>

    </select>

    <select required>

    <option selected disabled>
        Gender
    </option>

        <option>Male</option>

        <option>Female</option>

    </select>

    <label class="upload">

        Upload Face Claim

    <input
        type="file"
        accept="image/*">

    </label>

    <button type="submit">

    Create Character

    </button>

    </form>

<p class="login-link">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script src="../js/register.js"></script>

</body>

</html>
